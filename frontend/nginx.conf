server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Optional security (auth, IP allowlist) — enabled in prod via mounted configs
    include /etc/nginx/security/*.conf;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API requests to backend — SSE-friendly (no buffering)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;

        # Long timeout for SSE streams
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # CORS is handled by the backend's own middleware (CORS_ORIGINS env var).
        # Same-origin requests (frontend at / → /api/) don't need CORS headers.
    }

    # Health check endpoint — bypasses auth for Docker HEALTHCHECK
    location = /healthz {
        auth_basic off;
        return 200 "ok";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
